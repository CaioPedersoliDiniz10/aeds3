<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empréstimos – BiblioSystem</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <span class="brand">📚 BiblioSystem</span>
  <a href="index.html">Início</a>
  <a href="usuarios.html">Usuários</a>
  <a href="livros.html">Livros</a>
  <a href="emprestimos.html" class="active">Empréstimos</a>
  <a href="cupons.html">Cupons</a>
</nav>

<div class="container">
  <h1>Gerenciar Empréstimos</h1>

  <div id="alert-area"></div>

  <div class="card">
    <h2>Criar Novo Empréstimo</h2>
    <form id="form-criar">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label for="idUsuario">ID do Usuário</label>
          <input type="number" id="idUsuario" placeholder="ID do usuário" min="1" required/>
        </div>
        <div class="form-group">
          <label for="idLivro">ID do Livro</label>
          <input type="number" id="idLivro" placeholder="ID do livro" min="1" required/>
        </div>
        <div class="form-group">
          <label for="dataEmprestimo">Data de Empréstimo</label>
          <input type="date" id="dataEmprestimo" required/>
        </div>
        <div class="form-group">
          <label for="dataDevolucao">Data de Devolução (opcional)</label>
          <input type="date" id="dataDevolucao"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Criar Empréstimo</button>
    </form>
  </div>

  <div class="card">
    <h2>Consultar por ID</h2>
    <div style="display:flex;gap:.75rem;align-items:flex-end;">
      <div class="form-group" style="flex:1;margin:0;">
        <label for="busca-id">ID do Empréstimo</label>
        <input type="number" id="busca-id" placeholder="Digite o ID" min="1"/>
      </div>
      <button class="btn btn-primary" onclick="buscarPorId()">Buscar</button>
    </div>
    <div id="resultado-busca" style="margin-top:1rem;"></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <h2 style="margin:0;">Empréstimos Ativos</h2>
      <button class="btn btn-primary btn-sm" onclick="carregar()">🔄 Atualizar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Usuário</th><th>Livro</th><th>Data Emp.</th><th>Data Dev.</th><th>Ações</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty hidden">Nenhum empréstimo registrado.</div>
    </div>
  </div>
</div>

<!-- Modal Edição -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal">
    <h2>Editar Datas do Empréstimo</h2>
    <input type="hidden" id="edit-id"/>
    <div class="form-group"><label>Data de Empréstimo</label><input type="date" id="edit-dataEmprestimo"/></div>
    <div class="form-group"><label>Data de Devolução</label><input type="date" id="edit-dataDevolucao"/></div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()" style="background:var(--border);">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api/emprestimos';

  async function carregar() {
    try {
      const res = await fetch(API);
      const lista = await res.json();
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      tbody.innerHTML = '';
      if (!lista.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      lista.forEach(e => {
        tbody.innerHTML += `<tr>
          <td>${e.id}</td>
          <td>#${e.idUsuario}</td>
          <td>#${e.idLivro}</td>
          <td>${esc(e.dataEmprestimo)}</td>
          <td>${esc(e.dataDevolucao) || '—'}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="abrirModal(${e.id},'${esc(e.dataEmprestimo)}','${esc(e.dataDevolucao)}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluir(${e.id})">Excluir</button>
          </td>
        </tr>`;
      });
    } catch(err) { mostrarAlerta('error','Erro ao carregar empréstimos.'); }
  }

  document.getElementById('form-criar').addEventListener('submit', async e => {
    e.preventDefault();
    const body = new URLSearchParams({
      idUsuario:       document.getElementById('idUsuario').value,
      idLivro:         document.getElementById('idLivro').value,
      dataEmprestimo:  document.getElementById('dataEmprestimo').value,
      dataDevolucao:   document.getElementById('dataDevolucao').value
    });
    try {
      const res = await fetch(API, { method:'POST', body });
      const data = await res.json();
      if (res.ok) { mostrarAlerta('success','Empréstimo criado! ID: '+data.id); e.target.reset(); carregar(); }
      else mostrarAlerta('error', data.erro);
    } catch(err) { mostrarAlerta('error','Erro ao criar empréstimo.'); }
  });

  async function buscarPorId() {
    const id = document.getElementById('busca-id').value;
    if (!id) return;
    try {
      const res = await fetch(`${API}?id=${id}`);
      const data = await res.json();
      const div = document.getElementById('resultado-busca');
      if (res.ok) div.innerHTML = `<div class="alert alert-success">ID: ${data.id} | Usuário: #${data.idUsuario} | Livro: #${data.idLivro} | Emp: ${esc(data.dataEmprestimo)} | Dev: ${esc(data.dataDevolucao)||'—'}</div>`;
      else div.innerHTML = `<div class="alert alert-error">${esc(data.erro)}</div>`;
    } catch(e) {}
  }

  async function excluir(id) {
    if (!confirm('Excluir empréstimo #'+id+'?')) return;
    try {
      const res = await fetch(`${API}?id=${id}`, { method:'DELETE' });
      const data = await res.json();
      if (res.ok) { mostrarAlerta('success', data.mensagem); carregar(); }
      else mostrarAlerta('error', data.erro);
    } catch(e) { mostrarAlerta('error','Erro ao excluir.'); }
  }

  function abrirModal(id, dataEmp, dataDev) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-dataEmprestimo').value = dataEmp;
    document.getElementById('edit-dataDevolucao').value = dataDev;
    document.getElementById('modal').classList.remove('hidden');
  }
  function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

  async function salvarEdicao() {
    const id = document.getElementById('edit-id').value;
    const body = new URLSearchParams({
      dataEmprestimo: document.getElementById('edit-dataEmprestimo').value,
      dataDevolucao:  document.getElementById('edit-dataDevolucao').value
    });
    try {
      const res = await fetch(`${API}?id=${id}`, { method:'PUT', body });
      const data = await res.json();
      if (res.ok) { mostrarAlerta('success','Empréstimo atualizado!'); fecharModal(); carregar(); }
      else mostrarAlerta('error', data.erro);
    } catch(e) { mostrarAlerta('error','Erro ao atualizar.'); }
  }

  function mostrarAlerta(tipo, msg) {
    const div = document.getElementById('alert-area');
    div.innerHTML = `<div class="alert alert-${tipo}">${esc(msg)}</div>`;
    setTimeout(() => div.innerHTML = '', 4000);
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  carregar();
</script>
</body>
</html>
