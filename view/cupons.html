<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cupons – BiblioSystem</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <span class="brand">📚 BiblioSystem</span>
  <a href="index.html">Início</a>
  <a href="usuarios.html">Usuários</a>
  <a href="livros.html">Livros</a>
  <a href="emprestimos.html">Empréstimos</a>
  <a href="cupons.html" class="active">Cupons</a>
</nav>

<div class="container">
  <h1>Gerenciar Cupons</h1>

  <div id="alert-area"></div>

  <!-- Criar -->
  <div class="card">
    <h2>Cadastrar Novo Cupom</h2>
    <form id="form-criar">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label for="idEmprestimo">ID do Empréstimo</label>
          <input type="number" id="idEmprestimo" placeholder="ID do empréstimo" min="1" required/>
        </div>
        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" required>
            <option value="">Selecione...</option>
            <option value="DESCONTO">DESCONTO (% de desconto de multa)</option>
            <option value="EXTENSAO">EXTENSAO (dias adicionais de prazo)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="valor">Valor</label>
          <input type="number" id="valor" placeholder="Ex: 10 (para 10% ou 10 dias)" step="0.01" min="0.01" required/>
        </div>
        <div class="form-group">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Descrição opcional do cupom"/>
        </div>
      </div>
      <button type="submit" class="btn btn-success">Associar Cupom</button>
    </form>
  </div>

  <!-- Consultar -->
  <div class="card">
    <h2>Consultar Cupom</h2>
    <div style="display:flex;gap:.75rem;align-items:flex-end;">
      <div class="form-group" style="width:240px;margin:0;">
        <label for="tipo-busca">Tipo da busca</label>
        <select id="tipo-busca">
          <option value="id">Por ID do cupom</option>
          <option value="idEmprestimo">Por ID do empréstimo</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;margin:0;">
        <label for="busca-id">Valor</label>
        <input type="number" id="busca-id" placeholder="Digite o ID" min="1"/>
      </div>
      <button class="btn btn-primary" onclick="buscarCupom()">Buscar</button>
    </div>
    <div id="resultado-busca" style="margin-top:1rem;"></div>
  </div>

  <!-- Listar todos -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <h2 style="margin:0;">Cupons Registrados</h2>
      <button class="btn btn-primary btn-sm" onclick="carregar()">🔄 Atualizar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Empréstimo</th><th>Tipo</th><th>Valor</th><th>Descrição</th><th>Ações</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty hidden">Nenhum cupom registrado.</div>
    </div>
  </div>
</div>

<!-- Modal de Edicao -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal">
    <h2>Editar Cupom</h2>
    <input type="hidden" id="edit-id"/>
    <div class="form-group">
      <label for="edit-tipo">Tipo</label>
      <select id="edit-tipo">
        <option value="DESCONTO">DESCONTO</option>
        <option value="EXTENSAO">EXTENSAO</option>
      </select>
    </div>
    <div class="form-group">
      <label for="edit-valor">Valor</label>
      <input type="number" id="edit-valor" step="0.01" min="0.01"/>
    </div>
    <div class="form-group">
      <label for="edit-descricao">Descricao</label>
      <input type="text" id="edit-descricao"/>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()" style="background:var(--border);">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api/cupons';

  async function carregar() {
    try {
      const res = await fetch(API);
      const cupons = await res.json();
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      tbody.innerHTML = '';

      if (!cupons.length) {
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      cupons.forEach(c => {
        tbody.innerHTML += `<tr>
          <td>${c.id}</td>
          <td>#${c.idEmprestimo}</td>
          <td><span style="background:${c.tipo==='DESCONTO'?'#dbeafe':'#dcfce7'};padding:.2rem .5rem;border-radius:4px;font-size:.8rem;font-weight:600;">${esc(c.tipo)}</span></td>
          <td>${c.valor}${c.tipo==='DESCONTO' ? '%' : ' dias'}</td>
          <td>${esc(c.descricao) || '—'}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick='abrirModal(${c.id}, ${JSON.stringify(c.tipo || "")}, ${JSON.stringify(c.descricao || "")}, ${c.valor})'>Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluir(${c.id})">Excluir</button>
          </td>
        </tr>`;
      });
    } catch(err) { mostrarAlerta('error','Erro ao carregar cupons.'); }
  }

  document.getElementById('form-criar').addEventListener('submit', async e => {
    e.preventDefault();
    const body = new URLSearchParams({
      idEmprestimo: document.getElementById('idEmprestimo').value,
      tipo:      document.getElementById('tipo').value,
      descricao: document.getElementById('descricao').value,
      valor:     document.getElementById('valor').value
    });
    try {
      const res = await fetch(API, { method:'POST', body });
      const data = await res.json();
      if (res.ok) { mostrarAlerta('success','Cupom associado! ID do cupom: '+data.id); e.target.reset(); carregar(); }
      else mostrarAlerta('error', data.erro);
    } catch(err) { mostrarAlerta('error','Erro ao associar cupom.'); }
  });

  async function buscarCupom() {
    const valor = document.getElementById('busca-id').value;
    const tipoBusca = document.getElementById('tipo-busca').value;
    if (!valor) return;

    try {
      const qs = tipoBusca === 'id' ? `id=${valor}` : `idEmprestimo=${valor}`;
      const res = await fetch(`${API}?${qs}`);
      const data = await res.json();
      const div = document.getElementById('resultado-busca');
      if (res.ok) {
        div.innerHTML = `<div class="alert alert-success">
          Cupom #${data.id} | Empréstimo: #${data.idEmprestimo} | Tipo: ${esc(data.tipo)} | Valor: ${data.valor} | ${esc(data.descricao)||'Sem descrição'}
        </div>`;
      } else {
        div.innerHTML = `<div class="alert alert-error">${esc(data.erro)}</div>`;
      }
    } catch(e) {}
  }

  function abrirModal(id, tipo, descricao, valor) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-tipo').value = tipo;
    document.getElementById('edit-descricao').value = descricao;
    document.getElementById('edit-valor').value = valor;
    document.getElementById('modal').classList.remove('hidden');
  }

  function fecharModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  async function salvarEdicao() {
    const id = document.getElementById('edit-id').value;
    const body = new URLSearchParams({
      tipo: document.getElementById('edit-tipo').value,
      descricao: document.getElementById('edit-descricao').value,
      valor: document.getElementById('edit-valor').value
    });

    try {
      const res = await fetch(`${API}?id=${id}`, { method: 'PUT', body });
      const data = await res.json();
      if (res.ok) {
        mostrarAlerta('success', 'Cupom atualizado com sucesso.');
        fecharModal();
        carregar();
      } else {
        mostrarAlerta('error', data.erro);
      }
    } catch (e) {
      mostrarAlerta('error', 'Erro ao atualizar cupom.');
    }
  }

  async function excluir(id) {
    if (!confirm('Excluir cupom #' + id + '?')) return;
    try {
      const res = await fetch(`${API}?id=${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (res.ok) {
        mostrarAlerta('success', data.mensagem);
        carregar();
      } else {
        mostrarAlerta('error', data.erro);
      }
    } catch (e) {
      mostrarAlerta('error', 'Erro ao excluir cupom.');
    }
  }

  function mostrarAlerta(tipo, msg) {
    const div = document.getElementById('alert-area');
    div.innerHTML = `<div class="alert alert-${tipo}">${esc(msg)}</div>`;
    setTimeout(() => div.innerHTML = '', 5000);
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  carregar();
</script>
  <script src="livereload.js"></script>
</body>
</html>
